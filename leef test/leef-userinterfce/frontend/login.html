<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | leef 🍃</title>
    <script src="api-config.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card animate-scale">
            <div class="text-center mb-4">
                <a href="index.html" class="logo flex-center mb-2">
                    leef 🍃
                </a>
                <h1 class="text-2xl">Welcome Back</h1>
                <p class="text-light">Login to access your fresh account</p>
            </div>

            <form class="auth-form">


                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="text" name="identifier" class="form-input" placeholder="e.g. niaml@example.com"
                        required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="flex justify-between items-center mb-4">
                    <label class="form-check text-sm text-light m-0">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="forgot-password.html" class="text-sm color-primary">Forgot
                        password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-full">Sign In</button>
            </form>

            <div class="text-center mt-4 text-sm text-light">
                Don't have an account? <a href="register.html" class="color-primary fw-600">Register here</a>
            </div>

            <div class="text-center mt-3">
                <a href="index.html" class="text-light no-underline text-sm">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="animations.js"></script>
    <script>
        document.querySelector(".auth-form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const identifier = document.querySelector('input[name="identifier"]').value.trim();
            const password = document.querySelector('input[name="password"]').value;

            try {
                const res = await fetch(window.API_BASE_URL + "/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ identifier, password }),
                });

                // if backend sends an error message, show it
                if (!res.ok) {
                    const msg = await res.text();
                    alert(msg);
                    return;
                }

                const data = await res.json();
                // (optional) store who is logged in
                sessionStorage.setItem("user", JSON.stringify(data));

                // Chatbot Flow: Check if there's a pending redirect
                const redirectUrl = sessionStorage.getItem('redirectAfterLogin');
                // Normalize role to lowercase for safe comparison
                const userRole = data.role ? data.role.toLowerCase() : "";

                if (redirectUrl) {
                    sessionStorage.removeItem('redirectAfterLogin');

                    // ONLY redirect customers to the product page. Sellers go to dashboard.
                    if (userRole === 'customer') {
                        // Use replace and a small timeout to ensure the browser respects the redirect and doesn't race 
                        setTimeout(() => {
                            window.location.replace(redirectUrl);
                        }, 100);
                        return;
                    }
                }

                // ✅ redirect to dashboard based on returned role
                if (userRole === "customer") window.location.href = "customer-dashboard.html?v=" + new Date().getTime();
                else if (userRole === "seller") window.location.href = "seller-dashboard.html";
                else window.location.href = "admin-dashboard.html";
            } catch (err) {
                alert("Cannot connect to backend 😢. Is server.js running?");
            }
        });
    </script>

</body>

</html>
