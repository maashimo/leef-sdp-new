<!DOCTYPE html>
<html lang="en">

<head>
    <script src="api-config.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Orders - leef 🍃</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    /* Standardized Top Navbar */
    .top-navbar {
      background-color: rgba(10, 10, 10, 0.95);
      border-bottom: 1px solid #333;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar-logo {
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: bold;
      color: #4ade80;
    }

    .dashboard-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .muted-text {
      color: #9ca3af;
      font-size: 0.9rem;
    }

    .order-line {
      background: #222;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .search-container {
      position: relative;
      margin-bottom: 2rem;
    }

    .search-input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      color: #fff;
      padding: 0.8rem 1.2rem;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: #4ade80;
    }

    .btn-back {
      text-decoration: none;
      color: #888;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .btn-back:hover {
      color: #4ade80;
    }
  </style>
</head>

<body style="background:#0a0a0a; color:#eee; font-family:'Inter', sans-serif;">

  <nav class="top-navbar">
    <a href="seller-dashboard.html" class="navbar-logo">
      leef 🍃
    </a>
    <div style="font-weight: 500; font-size: 0.9rem; color: #888;">Order History</div>
  </nav>

  <main class="container" style="max-width: 1000px; margin: 2rem auto; padding: 0 1rem;">
    <a href="seller-dashboard.html" class="btn-back">
      ← Back to Dashboard
    </a>

    <div style="margin-bottom: 2rem;">
      <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">All Orders</h1>
      <p class="muted-text">Browse and search through your entire sales history.</p>
    </div>

    <div class="search-container">
      <input type="text" id="orderSearch" class="search-input" placeholder="Search by customer name, product, or order ID..." oninput="filterOrders()">
      <i style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #555;">🔍</i>
    </div>

    <div id="ordersList">
       <div style="color:#888; text-align:center; padding:3rem;">Loading your order history...</div>
    </div>
  </main>

  <!-- Customer Details Modal -->
  <div id="customerModal"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; align-items:center; justify-content:center;">
    <div
      style="background:#1a1a1a; width:400px; max-width:90%; border-radius:12px; border:1px solid #333; overflow:hidden;">
      <div
        style="padding:1.5rem; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0; color:#fff;" id="cm-name">Loading...</h3>
        <button onclick="document.getElementById('customerModal').style.display='none'"
          style="background:none; border:none; color:#888; font-size:1.5rem; cursor:pointer;">&times;</button>
      </div>
      <div style="padding:1.5rem; color:#ccc; font-size:0.95rem; line-height:1.6;" id="cm-body">
        <!-- Content injected here -->
      </div>
    </div>
  </div>

  <script>
    const API = window.API_BASE_URL;
    const user = JSON.parse(sessionStorage.getItem('user'));

    if (!user || user.role !== 'seller') {
      window.location.href = 'login.html';
    }

    let allOrders = [];

    async function loadAllOrders() {
      try {
        const res = await fetch(`${API}/api/orders/seller/${user.id}`);
        const data = await res.json();
        allOrders = Array.isArray(data) ? data : [];
        renderOrders(allOrders);
      } catch (e) {
        document.getElementById('ordersList').innerHTML = `<div style="color:#f87171; text-align:center; padding:2rem;">Error: ${e.message}</div>`;
      }
    }

    function renderOrders(ordersToRender) {
      const container = document.getElementById('ordersList');
      if (ordersToRender.length === 0) {
        container.innerHTML = '<div style="color:#888; text-align:center; padding:3rem;">No orders found matching your search.</div>';
        return;
      }

      container.innerHTML = ordersToRender.map(o => {
        const amount = calculateSellerSub(o.seller_unit_price, o.quantity);
        const statusColor = getStatusColor(o.status);
        const date = new Date(o.created_at).toLocaleDateString(undefined, {
            year: 'numeric', month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });

        return `
          <div class="order-line" style="margin-bottom: 1rem;">
            <div style="display:flex; gap:1.2rem; align-items:center;">
                <img src="${o.image_url}" style="width:50px; height:50px; border-radius:8px; object-fit:cover; border:1px solid #333;">
                <div>
                    <div style="font-weight:600; color:#fff; font-size:1.05rem;">${o.product_name}</div>
                    <div class="muted-text">
                        <span style="color: #38bdf8; cursor: pointer; text-decoration: underline;" onclick="openCustomerModal(${o.user_id}, ${user.id})">${o.customer_name}</span> · <span style="font-size:0.8rem;">${date}</span>
                    </div>
                    <div style="font-size:0.75rem; color:#888; margin-top:4px;">Order ID: #${o.id}</div>
                </div>
            </div>
            <div style="text-align:right;">
                <div style="font-weight:bold; color:#4ade80; font-size:1.1rem; margin-bottom:0.3rem;">LKR ${parseFloat(amount).toFixed(2)}</div>
                <div style="font-size:0.75rem; color:${statusColor}; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;">${o.status.replace(/_/g, ' ')}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function filterOrders() {
      const searchTerm = document.getElementById('orderSearch').value.toLowerCase();
      const filtered = allOrders.filter(o => 
        (o.product_name && o.product_name.toLowerCase().includes(searchTerm)) || 
        (o.customer_name && o.customer_name.toLowerCase().includes(searchTerm)) ||
        (o.id && String(o.id).includes(searchTerm))
      );
      renderOrders(filtered);
    }

    function getStatusColor(status) {
      if (status === 'completed' || status === 'delivered_to_driver') return '#4ade80';
      if (status === 'cancelled') return '#f87171';
      return '#fbbf24';
    }

    async function openCustomerModal(customerId, sellerId) {
      const modal = document.getElementById('customerModal');
      const title = document.getElementById('cm-name');
      const body = document.getElementById('cm-body');

      modal.style.display = 'flex';
      title.textContent = 'Loading...';
      body.innerHTML = '<div style="text-align:center; padding:2rem;"><span style="color:#888;">Fetching data...</span></div>';

      try {
        const res = await fetch(`${API}/api/auth/customer-stats/${customerId}/${sellerId}`);
        if (!res.ok) throw new Error('Failed to fetch details');
        const data = await res.json();

        title.textContent = data.name || 'Unknown Customer';
        body.innerHTML = `
          <div style="margin-bottom:1rem;">
            <strong>Phone:</strong> ${data.phone || '<span style="color:#888;">Not provided</span>'}<br>
            <strong>Email:</strong> ${data.email || '<span style="color:#888;">Not provided</span>'}<br>
            <strong>Location:</strong> ${data.address || ''} ${data.town ? ', ' + data.town : ''}
          </div>
          <div style="background:rgba(255,255,255,0.05); padding:1rem; border-radius:8px; border:1px solid #333;">
            <div style="font-weight:600; color:#38bdf8; margin-bottom:0.5rem; font-size:0.85rem; text-transform:uppercase;">Store Interaction History</div>
            <div style="display:flex; justify-content:space-between; margin-bottom:0.4rem;">
              <span>Total Orders with you:</span>
              <strong style="color:#fff;">${data.total_orders}</strong>
            </div>
            <div style="display:flex; justify-content:space-between;">
              <span>Total Refunds requested:</span>
              <strong style="color:#ef4444;">${data.total_refunds}</strong>
            </div>
          </div>
          <div style="background:rgba(255,255,255,0.05); padding:1rem; border-radius:8px; border:1px solid #333; margin-top:1rem; max-height:150px; overflow-y:auto;">
            <div style="font-weight:600; color:#4ade80; margin-bottom:0.8rem; font-size:0.85rem; text-transform:uppercase;">Past Approved Refunds</div>
            ${data.approved_refunds && data.approved_refunds.length > 0 ?
            data.approved_refunds.map(r =>
              '<div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222; padding-bottom:0.4rem; margin-bottom:0.4rem;">' +
              '<div>' +
              '<div style="color:#eee; font-size:0.85rem; font-weight:600;">' + (r.product_name || 'Item Refunded') + '</div>' +
              '<div style="color:#888; font-size:0.75rem;">' + new Date(r.updated_at).toLocaleDateString() + '</div>' +
              '</div>' +
              '<strong style="color:#f87171; font-size:0.85rem;">- LKR ' + r.refund_amount + '</strong>' +
              '</div>'
            ).join('')
            : '<div style="color:#888; font-style:italic; font-size:0.85rem;">No past approved refunds found.</div>'}
          </div>
        `;
      } catch (err) {
        title.textContent = 'Error';
        body.innerHTML = `<div style="color:#ef4444;">${err.message}</div>`;
      }
    }

    function calculateSellerSub(priceVal, qtyKg) {
      const str = String(priceVal || "0");
      let basePrice = 0, baseAmount = 1, baseUnit = 'kg';
      const match = str.match(/(\d+(?:\.\d+)?)\s*(?:per|\/|Rs\.?)\s*(\d+)?\s*([a-zA-Z]+)/i);
      if (match) {
        basePrice = parseFloat(match[1]);
        baseAmount = parseFloat(match[2]) || 1;
        baseUnit = match[3].toLowerCase();
      } else {
        const numMatch = str.match(/[\d.]+/);
        basePrice = numMatch ? parseFloat(numMatch[0]) : 0;
      }
      let unitInKg = 1;
      if (baseUnit === 'g' || baseUnit === 'grams') unitInKg = baseAmount / 1000;
      else if (baseUnit === 'kg' || baseUnit === 'kilogram') unitInKg = baseAmount;
      else unitInKg = baseAmount;
      return (basePrice * (qtyKg / unitInKg));
    }

    loadAllOrders();
  </script>
</body>

</html>
