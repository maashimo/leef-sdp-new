<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Product - 🍃 Leef</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fafaf9;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .header {
            width: 100%;
            padding: 1rem;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
        }

        .btn {
            padding: 0.6em 1.2em;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }

        .btn-primary {
            background: #16a34a;
            color: white;
        }

        .container {
            max-width: 600px;
            width: 90%;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            margin-top: 2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        label {
            display: block;
            margin-top: 1rem;
            font-weight: 600;
            color: #333;
        }

        input,
        textarea {
            width: 100%;
            padding: 0.8rem;
            margin-top: 0.4rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        h1 {
            color: #16a34a;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>

    <header class="header">
        <a href="inventory.html" class="btn btn-secondary">← Back to Inventory</a>
    </header>

    <main class="container">
        <h1>Update Product</h1>
        <p style="color:#666; margin-bottom:1.5rem;">Submit changes for admin approval. Your current product will remain
            live until approved.</p>

        <form id="updateForm">
            <input type="hidden" id="productId">

            <label>Product Name:</label>
            <input type="text" id="name" required>

            <label>Category:</label>
            <input type="text" id="category" required>

            <label>Price:</label>
            <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-top: 0.4rem;">
                <div style="position: relative; flex: 1; min-width: 120px;">
                    <span
                        style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: #666;">Rs.</span>
                    <input type="number" id="price_val" style="padding-left: 2.5rem; margin-top:0;"
                        placeholder="e.g. 300" required>
                </div>
                <span style="color: #888;">per</span>
                <input type="number" id="unit_val" style="flex: 0.6; min-width: 80px; margin-top:0;"
                    placeholder="e.g. 500" value="1" required>
                <select id="unit_type"
                    style="flex: 0.6; min-width: 80px; margin-top:0; padding:0.8rem; border:1px solid #ddd; border-radius:6px;"
                    required>
                    <option value="g">g</option>
                    <option value="kg" selected>kg</option>
                    <option value="unit">unit</option>
                    <option value="pack">pack</option>
                    <option value="liter">liter</option>
                </select>
            </div>
            <input type="hidden" id="price">
            <p id="price_preview" style="color: #16a34a; font-weight: 500; font-size: 0.9rem; margin-top: 0.4rem;"></p>

            <label>Stock:</label>
            <input type="text" id="stock" required>

            <label>Add Note (Reason for update):</label>
            <textarea id="note" rows="4"></textarea>

            <button type="submit" class="btn btn-primary" style="margin-top:1.5rem; width:100%;">Submit Update
                Request</button>
        </form>
    </main>

    <script>
        function updatePriceStr() {
            const pv = document.getElementById("price_val").value;
            const uv = document.getElementById("unit_val").value;
            const ut = document.getElementById("unit_type").value;
            if (pv && uv && ut) {
                const str = `${pv} per ${uv} ${ut}`;
                document.getElementById("price").value = str;
                document.getElementById("price_preview").textContent = `Price set: Rs. ${pv} per ${uv} ${ut}`;
            }
        }
        ["price_val", "unit_val", "unit_type"].forEach(id => {
            document.getElementById(id).addEventListener("input", updatePriceStr);
        });

        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            document.getElementById("productId").value = params.get("id") || "";
            document.getElementById("name").value = params.get("name") || "";
            document.getElementById("category").value = params.get("category") || "";
            document.getElementById("stock").value = params.get("stock") || "";
            document.getElementById("note").value = params.get("description") || "";

            const rawPrice = params.get("price") || "";
            if (rawPrice) {
                // Try to parse "300 per 500 g" or "150/kg"
                const match = rawPrice.match(/(\d+(?:\.\d+)?)\s*(?:per|\/)\s*(\d+)?\s*([a-zA-Z]+)/i);
                if (match) {
                    document.getElementById("price_val").value = match[1];
                    document.getElementById("unit_val").value = match[2] || "1";
                    document.getElementById("unit_type").value = match[3].toLowerCase();
                } else {
                    // Fallback for simple numeric prices
                    const numMatch = rawPrice.match(/[\d.]+/);
                    if (numMatch) document.getElementById("price_val").value = numMatch[0];
                }
                updatePriceStr();
            }
        });

        document.getElementById("updateForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            updatePriceStr();
            const user = JSON.parse(sessionStorage.getItem("user"));
            if (!user) return alert("Please login first");

            const data = {
                productId: document.getElementById("productId").value,
                sellerId: user.id || user.seller_id,
                name: document.getElementById("name").value,
                category: document.getElementById("category").value,
                price: document.getElementById("price").value,
                stock: document.getElementById("stock").value,
                description: document.getElementById("note").value
            };

            try {
                const res = await fetch("http://localhost:5000/api/products/update-request", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await res.json();
                if (res.ok) {
                    if (result.instant) {
                        alert("Stock updated instantly!");
                    } else {
                        alert(result.message || "Update requested! Check your inventory status.");
                    }
                    window.location.href = "inventory.html";
                } else {
                    alert("Error: " + result.message);
                }
            } catch (err) {
                console.error(err);
                alert("Connection failed");
            }
        });
    </script>

</body>

</html>
