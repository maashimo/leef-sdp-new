<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Refunds - 🍃 Leef</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    .top-navbar {
      background-color: rgba(10, 10, 10, 0.95);
      border-bottom: 1px solid #333;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .navbar-logo {
      text-decoration: none;
      font-weight: bold;
      color: #4ade80;
    }

    .navbar-nav {
      display: flex;
      list-style: none;
      margin: 0;
      padding: 0;
      gap: 2rem;
    }

    .navbar-link {
      text-decoration: none;
      color: #eee;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      transition: background-color 0.2s;
    }

    .navbar-link.active {
      background-color: #10b981;
      color: white;
    }

    .navbar-link:hover {
      background-color: #333;
    }

    .refund-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: flex-start;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .refund-badge {
      display: inline-block;
      padding: 0.3em 0.8em;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge-pending {
      background: rgba(251, 191, 36, 0.1);
      color: #fbbf24;
      border: 1px solid #fbbf24;
    }

    .badge-approved {
      background: rgba(22, 163, 74, 0.1);
      color: #4ade80;
      border: 1px solid #4ade80;
    }

    .badge-rejected {
      background: rgba(220, 38, 38, 0.1);
      color: #f87171;
      border: 1px solid #f87171;
    }

    .badge-waiting_seller {
      background: rgba(168, 85, 247, 0.1);
      color: #a855f7;
      border: 1px solid #a855f7;
    }

    .badge-seller_approved, .badge-seller_rejected {
      background: rgba(59, 130, 246, 0.1);
      color: #60a5fa;
      border: 1px solid #60a5fa;
    }
  </style>
</head>

<body>
  <nav class="top-navbar">
    <a href="index.html" class="navbar-logo">leef 🍃</a>
    <ul class="navbar-nav">
      <li><a href="customer-dashboard.html" class="navbar-link">Dashboard</a></li>
      <li><a href="products.html" class="navbar-link">Products</a></li>
      <li><a href="feedback.html" class="navbar-link">Feedback</a></li>
      <li><a href="returns.html" class="navbar-link active">Refund</a></li>
      <li><a href="profile.html" class="navbar-link">Profile</a></li>
      <li><a href="index.html" class="navbar-link" onclick="sessionStorage.removeItem('user')">Logout</a></li>
    </ul>
  </nav>

  <main class="main-content container" style="max-width: 900px; margin: 2em auto;">
    <div
      style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem;">
      <div>
        <h1 class="page-title" style="margin-bottom:0.2rem;">My Refund Requests</h1>
        <p class="page-subtitle">Track the status of your refund requests</p>
      </div>
      <a href="new-return-request.html" class="btn btn-primary" style="text-decoration:none;">+ New Refund Request</a>
    </div>

    <div id="refunds-list">
      <div style="text-align:center; color:#888; padding:3em;">Loading refund requests...</div>
    </div>
  </main>

  <script>
    const API = 'http://localhost:5000';
    const user = JSON.parse(sessionStorage.getItem('user') || 'null');

    if (!user) {
      sessionStorage.setItem('redirectAfterLogin', 'returns.html');
      window.location.href = 'login.html';
    }

    async function loadRefunds() {
      const container = document.getElementById('refunds-list');
      try {
        const res = await fetch(`${API}/api/refunds/customer/${user.id}`);
        const refunds = await res.json();

        if (refunds.length === 0) {
          container.innerHTML = `
            <div style="text-align:center; color:#888; padding:3em; background:#1a1a1a; border:1px solid #333; border-radius:12px;">
              <div style="font-size:2rem; margin-bottom:0.5rem;">📦</div>
              <p>No refund requests yet.</p>
              <a href="new-return-request.html" class="btn btn-primary" style="text-decoration:none; display:inline-block; margin-top:1rem;">Submit Your First Request</a>
            </div>`;
          return;
        }

        container.innerHTML = '';
        refunds.forEach(r => {
          let statusLabel = r.status.replace('_', ' ').toUpperCase();
          let badgeClass = `badge-${r.status}`;

          if (r.status === 'pending') statusLabel = 'PENDING REVIEW';
          if (r.status === 'waiting_seller') statusLabel = 'UNDER REVIEW (WITH SELLER)';
          if (r.status === 'seller_approved' || r.status === 'seller_rejected') statusLabel = 'UNDER FINAL ADMIN REVIEW';
          if (r.status === 'approved') statusLabel = 'APPROVED ✅';
          if (r.status === 'rejected') statusLabel = 'REJECTED ❌';
          if (r.payment_status === 'paid') statusLabel = 'REFUND PAID 💰';

          const imgUrl = r.image_url ? (r.image_url.startsWith('/') ? `${API}${r.image_url}` : `${API}/${r.image_url}`) : 'https://via.placeholder.com/48x48?text=🍃';

          // Only show refund amount when approved or paid
          const showAmount = (r.status === 'approved' || r.payment_status === 'paid');

          const card = document.createElement('div');
          card.className = 'refund-card';
          card.innerHTML = `
            <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/48x48?text=🍃'"
              style="width:52px; height:52px; object-fit:cover; border-radius:0.5em; flex-shrink:0;" alt="">
            <div style="flex:1; min-width:200px;">
              <div style="font-weight:700; color:#fff; font-size:1rem; margin-bottom:0.3rem;">${r.product_name || 'Unknown Product'}</div>
              <div style="color:#9ca3af; font-size:0.85rem; margin-bottom:0.3rem;">Order #REQ-${r.order_id} &nbsp;•&nbsp; ${new Date(r.created_at).toLocaleDateString()}</div>
              <div style="color:#ccc; font-size:0.9rem;"><span style="color:#888;">Reason:</span> ${r.reason}</div>
              ${(r.status === 'approved' || r.payment_status === 'paid') ? `<div style="color:#4ade80; font-weight:600; font-size:0.95rem; margin-top:0.4rem;">Refund Value: LKR ${parseFloat(r.refund_amount).toLocaleString()}</div>` : ''}

              ${(r.status === 'pending' || r.status === 'waiting_seller' || r.status === 'seller_approved' || r.status === 'seller_rejected') ? `<div style="color:#fbbf24; font-size:0.85rem; margin-top:0.4rem; font-style:italic;">Your request is being reviewed by the team. We will notify you once a final decision is made.</div>` : ''}

              ${r.description ? `<div style="color:#888; font-size:0.85rem; margin-top:0.3rem;">${r.description}</div>` : ''}
              ${r.admin_note && r.responsible_party === 'delivery' ? `<div style="margin-top:0.5rem; font-size:0.85rem; color:#4ade80;">Admin note: ${r.admin_note}</div>` : ''}
            </div>
            <div style="flex-shrink:0; text-align:right;">
              <span class="refund-badge ${badgeClass}">${statusLabel}</span>
              <div style="color:#666; font-size:0.78rem; margin-top:0.4rem;">Updated ${new Date(r.updated_at || r.created_at).toLocaleDateString()}</div>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (e) {
        container.innerHTML = `<div style="color:#f87171; text-align:center; padding:2em;">Failed to load refunds: ${e.message}</div>`;
      }
    }

    // Show success toast if redirected from new-return-request.html
    if (localStorage.getItem('refundSuccess')) {
      localStorage.removeItem('refundSuccess');
      const t = document.createElement('div');
      t.textContent = '✅ Refund request submitted successfully!';
      Object.assign(t.style, {
        position: 'fixed', right: '20px', bottom: '20px',
        background: '#16a34a', color: '#fff', padding: '12px 18px',
        borderRadius: '8px', zIndex: 99999, fontWeight: '600'
      });
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }

    async function acceptPartialRefund(id) {
      if (!confirm('Do you accept this adjusted refund amount? Once accepted, your request will proceed for finalization.')) return;
      try {
        const res = await fetch(`${API}/api/refunds/${id}/customer-accept`, { method: 'PUT' });
        if (!res.ok) throw new Error('Failed to accept offer');
        showToast('Offer accepted! Processing...');
        await loadRefunds();
      } catch (e) {
        showToast('Error: ' + e.message, 3000, '#dc2626');
      }
    }

    function showToast(msg, duration = 3000, bg = '#16a34a') {
      const t = document.createElement('div');
      t.textContent = msg;
      Object.assign(t.style, {
        position: 'fixed', right: '20px', bottom: '20px',
        background: bg, color: '#fff', padding: '12px 18px',
        borderRadius: '8px', zIndex: 9999, fontWeight: '600',
        transition: 'opacity 0.3s'
      });
      document.body.appendChild(t);
      setTimeout(() => {
        t.style.opacity = '0';
        setTimeout(() => t.remove(), 300);
      }, duration);
    }

    loadRefunds();
  </script>
</body>

</html>
