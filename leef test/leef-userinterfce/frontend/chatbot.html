<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot | leef 🍃</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      background-color: #0b0f19;
      /* Deep dark aesthetic matching the rest of leef */
      color: #ffffff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 550px;
      height: 85vh;
      background: #141b2d;
      border-radius: 20px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
      border: 1px solid #1f2940;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .chat-header {
      padding: 20px 24px;
      background: #1f2940;
      border-bottom: 1px solid #2a3553;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .chat-header a {
      color: var(--primary-color, #4CAF50);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .chat-header h1 {
      margin: 0;
      font-size: 1.4rem;
      color: #fff;
      font-weight: 600;
      flex: 1;
      text-align: center;
      padding-right: 40px;
      /* Balance the back button */
    }

    .messages {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: #2a3553;
      border-radius: 4px;
    }

    .msg-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    .msg-wrapper.bot {
      align-self: flex-start;
    }

    .msg-wrapper.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .msg-bubble {
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-wrap: break-word;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .bot .msg-bubble {
      background: #1f2940;
      color: #e0e6ed;
      border-bottom-left-radius: 4px;
      border: 1px solid #2a3553;
    }

    .user .msg-bubble {
      background: linear-gradient(135deg, #4CAF50, #388E3C);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .input-area {
      padding: 16px 24px;
      background: #1f2940;
      border-top: 1px solid #2a3553;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 24px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      outline: none;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .input-area input:focus {
      border-color: #4CAF50;
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
    }

    .input-area input::placeholder {
      color: #64748b;
    }

    .input-area button {
      padding: 12px 24px;
      border: none;
      border-radius: 24px;
      background: #4CAF50;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
    }

    .input-area button:hover {
      background: #43A047;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(76, 175, 80, 0.4);
    }

    .input-area button:active {
      transform: translateY(0);
    }

    /* Product Card Styles */
    .product-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
      width: 100%;
    }

    .product-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      display: flex;
      gap: 16px;
      align-items: center;
      transition: all 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-3px) scale(1.02);
      border-color: #4CAF50;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      background: #141b2d;
    }

    .product-image {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      background: #1e293b;
      flex-shrink: 0;
    }

    .product-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .product-name {
      font-weight: 600;
      font-size: 1.05rem;
      color: #f8fafc;
      margin: 0;
    }

    .product-price {
      color: #4CAF50;
      font-weight: 700;
      font-size: 1rem;
      margin: 0;
    }

    .product-details {
      font-size: 0.8rem;
      color: #94a3b8;
      margin: 0;
      line-height: 1.3;
    }

    .typing-indicator {
      display: inline-flex;
      gap: 5px;
      padding: 14px 20px;
      background: #1f2940;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      border: 1px solid #2a3553;
      align-self: flex-start;
      margin-top: 8px;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #64748b;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) {
      animation-delay: -0.32s;
    }

    .dot:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0);
        opacity: 0.5;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .suggestions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .suggestion-chip {
      background: rgba(76, 175, 80, 0.15);
      color: #4CAF50;
      border: 1px solid rgba(76, 175, 80, 0.3);
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .suggestion-chip:hover {
      background: rgba(76, 175, 80, 0.3);
      transform: translateY(-1px);
    }

    /* Autocomplete Suggestions */
    .autocomplete-box {
      position: absolute;
      bottom: 85px;
      left: 15px;
      right: 15px;
      background: #1f2940;
      border: 1px solid #2a3553;
      border-radius: 12px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      box-shadow: 0 -10px 20px rgba(0,0,0,0.4);
    }

    .suggestion-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #2a3553;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s;
    }

    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: #2a3553; }
    .suggestion-item img { width: 30px; height: 30px; border-radius: 4px; object-fit: cover; }
    .suggestion-item .name { flex: 1; font-size: 0.9rem; }
    .suggestion-item .price { font-size: 0.8rem; color: #4CAF50; font-weight: bold; }
  </style>
</head>

<body>
  <div class="chat-container">
    <div class="chat-header">
      <a href="index.html">← Back</a>
      <h1>🍃 Chat with Leef</h1>
    </div>

    <div class="messages" id="messages">
      <!-- Welcome message -->
      <div class="msg-wrapper bot">
        <div class="msg-bubble">
          👋 Welcome to AgriConnect!<br><br>
          I can help you find fresh products. Type <strong>START</strong> to explore.
          <div class="suggestions">
            <div class="suggestion-chip" onclick="handleSuggestion('START')">START</div>
          </div>
        </div>
      </div>
    </div>

    <div class="autocomplete-box" id="autocompleteBox"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Search products (e.g. Carrots)..." autocomplete="off">
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    const sendBtn = document.getElementById('sendBtn');
    const userInput = document.getElementById('userInput');
    const messages = document.getElementById('messages');

    let chatState = 'SEARCH'; // INIT -> SEARCH

    // Iframe Detection - Hide back button if embedded
    if (window.self !== window.top) {
      const backBtn = document.querySelector('.chat-header a');
      if (backBtn) backBtn.style.display = 'none';
      const container = document.querySelector('.chat-container');
      if (container) {
        container.style.height = '100vh';
        container.style.borderRadius = '0';
        container.style.border = 'none';
      }
    }

    let productCatalog = [];
    async function loadCatalog() {
      try {
        const res = await fetch('http://localhost:5000/api/products/marketplace');
        productCatalog = await res.json();
      } catch (err) {
        console.error("Catalog load error:", err);
      }
    }
    loadCatalog();

    const autocompleteBox = document.getElementById('autocompleteBox');
    userInput.addEventListener('input', (e) => {
      const val = e.target.value.trim().toLowerCase();
      if (val.length < 1) {
        autocompleteBox.style.display = 'none';
        return;
      }

      const matches = productCatalog.filter(p => 
        p.name.toLowerCase().includes(val) || 
        (p.category && p.category.toLowerCase().includes(val))
      ).slice(0, 5);

      if (matches.length > 0) {
        autocompleteBox.innerHTML = matches.map(p => `
          <div class="suggestion-item" onclick="selectSuggestion('${p.name.replace(/'/g, "\\'")}')">
            <img src="http://localhost:5000/${p.image_url ? p.image_url.split(',')[0] : 'images/default.png'}" alt="">
            <span class="name">${p.name} <small style="color:#94a3b8; display:block; font-size:0.75rem;">🏪 ${p.shop_name} | 📦 ${p.stock}</small></span>
          </div>
        `).join('');
        autocompleteBox.style.display = 'block';
      } else {
        autocompleteBox.style.display = 'none';
      }
    });

    window.selectSuggestion = (name) => {
      userInput.value = name;
      autocompleteBox.style.display = 'none';
      userInput.focus();
      handleSend();
    };

    const formatCurrency = (val) => {
      if (!val) return '₹0';
      if (typeof val === 'string' && val.includes('₹')) return val;
      return `₹${val}`;
    };

    const scrollToBottom = () => {
      messages.scrollTop = messages.scrollHeight;
    };

    const addMessage = (text, sender, isHtml = false) => {
      const wrapper = document.createElement('div');
      wrapper.className = `msg-wrapper ${sender}`;

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      if (isHtml) {
        bubble.innerHTML = text;
      } else {
        bubble.textContent = text;
      }

      wrapper.appendChild(bubble);
      messages.appendChild(wrapper);
      scrollToBottom();
    };

    const showTyping = () => {
      const wrapper = document.createElement('div');
      wrapper.className = 'typing-indicator';
      wrapper.id = 'typingIndicator';
      wrapper.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      messages.appendChild(wrapper);
      scrollToBottom();
    };

    const removeTyping = () => {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) indicator.remove();
    };

    const handleProductClick = (productId) => {
      localStorage.setItem('redirectAfterLogin', `product-details.html?id=${productId}`);
      window.location.href = 'login.html';
    };

    // Make it accessible for innerHTML clicks
    window.handleSuggestion = (text) => {
      userInput.value = text;
      handleSend();
    };

    window.triggerProductClick = (id) => handleProductClick(id);

    const renderProducts = (products) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'msg-wrapper bot';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';

      if (products.length === 0) {
        bubble.innerHTML = "Sorry, I couldn't find any available products matching your search. Try another keyword like <em>carrot</em> or <em>tomato</em>.";
        wrapper.appendChild(bubble);
      } else {
        bubble.textContent = `I found ${products.length} product(s). Click on any to login and view details:`;
        wrapper.appendChild(bubble);

        const cardsContainer = document.createElement('div');
        cardsContainer.className = 'product-cards';

        products.forEach(p => {
          const imgUrl = p.image_url ? `http://localhost:5000/${p.image_url}` : 'https://via.placeholder.com/80?text=No+Img';

          // Added product id data attribute and onclick directly to html
          const cardHtml = `
            <div class="product-card" onclick="triggerProductClick(${p.id})">
                <img class="product-image" src="${imgUrl}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/80?text=No+Image'">
                <div class="product-info">
                  <h3 class="product-name">${p.name}</h3>
                  <p class="product-details" style="margin-top:8px;">🏪 <strong>${p.shop_name}</strong> (${p.shop_town})<br>📦 <strong>${p.stock}</strong> units available</p>
                </div>
            </div>
          `;
          cardsContainer.insertAdjacentHTML('beforeend', cardHtml);
        });
        wrapper.appendChild(cardsContainer);
      }

      messages.appendChild(wrapper);
      scrollToBottom();
    };

    const renderReport = (data, date) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'msg-wrapper bot';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';

      let html = `<strong>📊 Report for ${date}</strong><br><br>`;

      html += `<strong>📦 Orders:</strong><br>`;
      if (data.orders && data.orders.length > 0) {
        data.orders.forEach(o => {
          html += `- ${o.total_qty}x ${o.product_name} (To: ${o.customer_name}) - <em>${o.status}</em><br>`;
        });
      } else {
        html += `<span style="color:#94a3b8;font-size:0.85rem;">No orders found for this date.</span><br>`;
      }

      html += `<br><strong>📝 Feedbacks:</strong><br>`;
      if (data.feedbacks && data.feedbacks.length > 0) {
        data.feedbacks.forEach(f => {
          let stars = '⭐'.repeat(f.rating || 5);
          html += `- ${f.product_name}: ${stars} "${f.comment || 'No comment'}" (${f.customer_name})<br>`;
        });
      } else {
        html += `<span style="color:#94a3b8;font-size:0.85rem;">No feedbacks received on this date.</span>`;
      }

      bubble.innerHTML = html;
      wrapper.appendChild(bubble);
      messages.appendChild(wrapper);
      scrollToBottom();
    };

    const handleSend = async () => {
      const text = userInput.value.trim();
      if (!text) return;

      // Hide suggestions when sending
      if (autocompleteBox) autocompleteBox.style.display = 'none';

      addMessage(text, 'user', false);
      userInput.value = '';

      if (chatState === 'INIT') {
        if (text.toUpperCase() === 'START') {
          chatState = 'SEARCH';
          showTyping();

          const userStr = sessionStorage.getItem('user');
          let isSeller = false;
          if (userStr) {
            const user = JSON.parse(userStr);
            isSeller = user.role && user.role.toLowerCase() === 'seller';
          }

          setTimeout(() => {
            removeTyping();
            if (isSeller) {
              addMessage(`
                  Welcome Seller! You can generate your daily report here.
                  <div class="suggestions">
                      <div class="suggestion-chip" onclick="handleSuggestion('report 2022/09/23')">Example: report 2022/09/23</div>
                  </div>
                `, 'bot', true);
            } else {
              addMessage(`
                  Great! What kind of product are you looking for?
                  <div class="suggestions">
                      <div class="suggestion-chip" onclick="handleSuggestion('carrot')">Carrot</div>
                      <div class="suggestion-chip" onclick="handleSuggestion('potato')">Potato</div>
                      <div class="suggestion-chip" onclick="handleSuggestion('tomato')">Tomato</div>
                  </div>
                `, 'bot', true);
            }
          }, 800);
        } else {
          showTyping();
          setTimeout(() => {
            removeTyping();
            addMessage("Please type <strong>START</strong> to begin exploring products.", 'bot', true);
          }, 600);
        }
        return;
      }

      if (chatState === 'SEARCH') {
        showTyping();
        try {
          const userStr = sessionStorage.getItem('user');
          let isSeller = false;
          let userObj = null;

          if (userStr) {
            userObj = JSON.parse(userStr);
            isSeller = userObj.role && userObj.role.toLowerCase() === 'seller';
          }

          // Check for 'report YYYY/MM/DD' command
          const reportMatch = text.match(/^report\s+(\d{4}[\/\-]\d{2}[\/\-]\d{2})$/i);
          if (reportMatch) {
            const date = reportMatch[1];

            if (!isSeller) {
              removeTyping();
              addMessage("This command is restricted to sellers only. <a href='login.html'>Login as seller</a> to view reports.", 'bot', true);
              return;
            }

            const res = await fetch(`http://localhost:5000/api/orders/seller-report?sellerId=${userObj.id}&date=${date}`);
            if (!res.ok) throw new Error("Report fetch failed");
            const data = await res.json();

            setTimeout(() => {
              removeTyping();
              renderReport(data, date);
            }, 600);
            return;
          }

          // If it's NOT a report command, check if they are a seller. Sellers CANNOT search products.
          if (isSeller) {
            removeTyping();
            addMessage("As a seller, you can only generate reports here. Try typing <strong>report YYYY/MM/DD</strong>. Switch to a customer account to search for products.", 'bot', true);
            return;
          }

          // Otherwise, normal product search for guests/customers
          const res = await fetch(`http://localhost:5000/api/products/chatbot-search?q=${encodeURIComponent(text)}`);
          if (!res.ok) throw new Error("Search failed");
          const data = await res.json();

          setTimeout(() => {
            removeTyping();
            renderProducts(data);
          }, 600); // Slight delay to make it feel natural

        } catch (err) {
          removeTyping();
          console.error(err);
          addMessage("Oops! Something went wrong while searching the server. Please ensure backend is running.", 'bot', false);
        }
      }
    };

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleSend();
    });

    // Auto-focus input & handle clicks outside suggestions
    window.addEventListener('load', () => {
      userInput.focus();
    });

    document.addEventListener('click', (e) => {
      if (e.target !== userInput && !autocompleteBox.contains(e.target)) {
        autocompleteBox.style.display = 'none';
      }
    });
  </script>
</body>

</html>
