<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - leef 🍃</title>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        /* Top Navbar Styles (Standardized) */
        .top-navbar {
            background-color: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid #333;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .navbar-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-logo {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: bold;
            color: #4ade80;
        }

        .navbar-nav {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 2rem;
        }

        .navbar-link {
            text-decoration: none;
            color: #eee;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            transition: background-color 0.2s;
        }

        .navbar-link.active {
            background-color: #10b981;
            color: white;
        }

        .navbar-link:hover {
            background-color: #333;
        }

        @media (max-width: 768px) {
            .top-navbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .navbar-nav {
                gap: 1rem;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>

<body class="">

    <!-- Navbar -->
    <nav class="top-navbar">
        <div class="navbar-header">
            <a href="index.html" class="navbar-logo">
                leef 🍃
            </a>
        </div>
        <ul class="navbar-nav">
            <li><a href="seller-dashboard.html" class="navbar-link">Dashboard</a></li>
            <li><a href="inventory.html" class="navbar-link active">Inventory</a></li>
            <li><a href="seller-refunds.html" class="navbar-link">Refunds</a></li>
            <li><a href="profile-seller.html" class="navbar-link">Profile</a></li>
            <li><a href="#" class="navbar-link" style="color:#ef4444;"
                    onclick="sessionStorage.removeItem('user'); window.location.href='index.html'; return false;">Logout</a>
            </li>
        </ul>
    </nav>
    <script src="seller-sidebar.js"></script>

    <main class="main-content container" style="max-width: 1200px; margin: 2rem auto; padding: 0 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h1 class="page-title">Inventory</h1>
                <p class="page-subtitle">Manage your product stock and pricing</p>
            </div>
            <a href="newproduct.html" class="btn btn-primary" style="text-decoration: none;">
                + Add New Product
            </a>
        </div>

        <!-- Inventory Table -->
        <div class="table-container"
            style="background: #1a1a1a; padding: 1rem; border-radius: 12px; border: 1px solid #333;">
            <table class="table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Category</th>
                        <th>Price(Lkr)</th>
                        <th>Stock(kg)</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>

                    </tr>
                </thead>
                <tbody id="inventoryBody">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const user = JSON.parse(sessionStorage.getItem("user"));
            if (!user || user.role !== "seller") {
                window.location.href = "login.html";
                return;
            }

            try {
                const res = await fetch(`http://localhost:5000/api/products/seller/${user.id}`);
                const products = await res.json();
                const tbody = document.getElementById("inventoryBody");
                tbody.innerHTML = "";

                if (products.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='7' style='text-align:center;color:#888;'>No products found. Add some!</td></tr>";
                    return;
                }

                products.forEach(p => {
                    let statusColor, statusText, statusBg;

                    if (p.has_pending_update) {
                        statusColor = "#f97316"; // Orange
                        statusText = "Update Pending";
                        statusBg = "rgba(249, 115, 22, 0.2)";
                    } else if (p.is_approved === 1) {
                        statusColor = "#4ade80"; // Green
                        statusText = "Active";
                        statusBg = "rgba(22, 163, 74, 0.2)";
                    } else if (p.is_approved === 2) {
                        statusColor = "#ef4444"; // Red
                        statusText = "Rejected";
                        statusBg = "rgba(239, 68, 68, 0.2)";
                    } else {
                        statusColor = "#fbbf24"; // Yellow
                        statusText = "Pending";
                        statusBg = "rgba(251, 191, 36, 0.2)";
                    }
                    const isOutOfStock = parseFloat(p.stock) <= 0 || p.stock === '0' || p.stock === '0kg' || p.stock === '0g';
                    const tr = document.createElement("tr");
                    if (isOutOfStock) {
                        tr.style.background = "rgba(239, 68, 68, 0.05)";
                    }
                    tr.innerHTML = `
                        <td>${p.name}</td>
                        <td>${p.category || 'N/A'}</td>
                        <td>${p.price}</td>
                        <td style="width: 140px; position:relative;">
                          <div style="margin-bottom:4px;">
                            ${isOutOfStock ? '<span style="color:#ef4444; font-size:0.7rem; font-weight:bold; display:block;">STOCK EMPTY!</span>' : ''}
                            <div style="display: flex; align-items: center; gap: 4px;">
                              <input type="text" value="${p.stock}" 
                                  style="width: 70px; padding: 0.3rem; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-family: inherit; ${isOutOfStock ? 'color: #ef4444; font-weight: bold; border-color: #ef4444; background:#fff1f2;' : ''}"
                                  onkeydown="if(event.key==='Enter') this.nextElementSibling.click()">
                              <button onclick="updateStockDirectly(${p.id}, this.previousElementSibling.value, this.previousElementSibling, ${JSON.stringify(p).replace(/"/g, '&quot;')})" 
                                      style="background: #10b981; color: white; border: none; border-radius: 4px; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.9rem;"
                                      title="Update Stock">
                                ✔️
                              </button>
                            </div>
                          </div>
                        </td>
                        <td>${new Date(p.created_at).toLocaleDateString()}</td>
                        <td>
                            <span style="background: ${statusBg}; color: ${statusColor}; padding: 0.3em 0.8em; border-radius: 2em; font-size: 0.85rem; font-weight: 600;">${statusText}</span>
                        </td>
                        <td>
                            <a href="existingproduct.html?id=${p.id}&name=${encodeURIComponent(p.name)}&category=${encodeURIComponent(p.category)}&price=${encodeURIComponent(p.price)}&stock=${encodeURIComponent(p.stock)}&description=${encodeURIComponent(p.description || '')}" 
                               class="btn" style="background: #333; color: #fff; text-decoration: none; padding: 0.4em 0.8em; border-radius: 6px; font-size: 0.9rem; margin-right: 0.5rem;">Edit All</a>
                            <button class="btn" onclick="deleteProduct(${p.id})" style="background: rgba(239, 68, 68, 0.2); color: #ef4444; border: none; padding: 0.4em 0.8em; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer;">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error("Failed to fetch inventory", err);
            }
        });

        async function updateStockDirectly(id, newStock, inputElem, product) {
            const user = JSON.parse(sessionStorage.getItem("user"));
            if (!user) return alert("Session expired. Please login again.");

            const trimmedStock = newStock.trim();
            // USER REQUEST: Mention "dont add other letters, only numbers or kg/g" if other letters found
            const isNumeric = /^\d+\s*(kg|g)?$/i.test(trimmedStock);
            
            // Visual feedback - loading state
            inputElem.style.borderColor = "#fbbf24"; // Yellow

            try {
                const res = await fetch(`http://localhost:5000/api/products/direct-stock-update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        productId: id,
                        sellerId: user.id || user.seller_id,
                        name: product.name,
                        category: product.category,
                        price: product.price,
                        stock: trimmedStock,
                        description: product.description || ""
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    
                    // Specific message for letters vs numbers as requested
                    if (!isNumeric) {
                        alert("Dont add other letters, only numbers or kg/g. Product removed from catalog temporarily.");
                        inputElem.style.borderColor = "#f97316"; // Orange
                    } else {
                        inputElem.style.borderColor = "#4ade80"; // Green
                        setTimeout(() => {
                            inputElem.style.borderColor = "#ddd";
                        }, 1000);
                    }

                    // Update the status label in the UI without reload
                    const row = inputElem.closest("tr");
                    const statusSpan = row.querySelector("td span[style*='border-radius: 2em']");
                    if (statusSpan) {
                        if (!isNumeric) {
                            statusSpan.innerText = "Pending";
                            statusSpan.style.color = "#fbbf24";
                            statusSpan.style.background = "rgba(251, 191, 36, 0.2)";
                        } else {
                            statusSpan.innerText = "Active";
                            statusSpan.style.color = "#4ade80";
                            statusSpan.style.background = "rgba(22, 163, 74, 0.2)";
                        }
                    }
                    showToast("Stock updated successfully!", "success");
                } else {
                    const data = await res.json().catch(() => ({ message: "Unknown Server Error" }));
                    showToast("Error: " + (data.message || "Failed to update"), "error");
                    inputElem.style.borderColor = "#ef4444"; // Red
                }
            } catch (e) {
                console.error(e);
                showToast("Network error. Could not update stock.", "error");
                inputElem.style.borderColor = "#ef4444"; // Red
            }
        }

        async function quickStockUpdate(id, currStock, product) {
            const newStock = prompt(`Update stock for '${product.name}':\nCurrent: ${currStock}`, currStock);
            if (newStock === null || newStock.trim() === '' || newStock === currStock) return;

            const user = JSON.parse(sessionStorage.getItem("user"));
            if (!user) return alert("Session expired. Please login again.");

            try {
                const res = await fetch(`http://localhost:5000/api/products/direct-stock-update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        productId: id,
                        sellerId: user.id || user.seller_id,
                        name: product.name,
                        category: product.category,
                        price: product.price,
                        stock: newStock.trim(),
                        description: product.description || ""
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    alert(data.message || "Stock updated!");
                    window.location.reload();
                } else {
                    alert("Error: " + data.message);
                }
            } catch (e) {
                console.error(e);
                alert("Failed to update stock. Please try again later.");
            }
        }

        async function deleteProduct(id) {
            if (!confirm("Are you sure you want to delete this product? This action cannot be undone.")) return;

            const user = JSON.parse(sessionStorage.getItem("user"));
            if (!user) return;

            try {
                const res = await fetch(`http://localhost:5000/api/products/seller/delete/${id}`, {
                    method: "DELETE",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ sellerId: user.id })
                });

                if (res.ok) {
                    showToast("Product deleted successfully", "success");
                    setTimeout(() => window.location.reload(), 1500);
                } else {
                    const err = await res.json();
                    showToast("Failed to delete: " + (err.message || "Unknown error"), "error");
                }
            } catch (e) {
                console.error(e);
                showToast("Server error", "error");
            }
        }

        function showToast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                document.body.appendChild(container);
            }

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.style.display = 'flex';
            toast.style.alignItems = 'center';
            toast.style.justifyContent = 'space-between';
            toast.innerHTML = `
                <span>${message}</span>
                <button onclick="this.parentElement.remove()" style="background:transparent; border:none; color:white; font-size:1.2rem; cursor:pointer; padding:0; margin-left:10px;">&times;</button>
            `;

            container.appendChild(toast);

            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);

            // Auto-remove
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }
    </script>
    </main>
</body>

</html>
