<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Feedback - Admin | leef 🍃</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    :root {
      --green: #16a34a;
      --orange: #f97316;
      --red: #dc2626;
      --blue: #2563eb;
      --bg: #ffffff;
      --card: #fff;
      --muted: #555;
      --shadow: rgba(0, 0, 0, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: var(--bg);
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    aside {
      width: 240px;
      background: var(--card);
      padding: 1.5em 1em;
      box-shadow: 2px 0 6px var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 1.2em;
      flex-shrink: 0;
    }

    aside .logo {
      display: flex;
      align-items: center;
      gap: 0.5em;
      font-size: 1.5rem;
      margin-bottom: 2em;
      text-decoration: none;
      color: var(--green);
      font-weight: bold;
    }

    aside nav a {
      display: block;
      padding: 0.7em 1em;
      color: var(--muted);
      text-decoration: none;
      border-radius: 0.5em;
      transition: background 0.2s, color 0.2s;
      font-size: 0.95rem;
      font-weight: 500;
    }

    aside nav a.active,
    aside nav a:hover {
      background: var(--green);
      color: #fff;
      font-weight: bold;
    }

    aside button.redeem-btn {
      margin-top: auto;
      width: 100%;
      background: var(--orange);
      color: #fff;
      border: none;
      padding: 0.6em;
      border-radius: 0.5em;
      cursor: pointer;
      font-weight: bold;
    }

    /* Main content */
    main {
      flex: 1;
      padding: 2em;
      display: flex;
      flex-direction: column;
      gap: 2em;
      overflow-y: auto;
    }

    .page-title {
      color: #222 !important;
    }

    .page-subtitle {
      color: #555 !important;
    }

    .feedback-card {
      background: #fff;
      border: 1px solid #eee;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
      border-radius: 12px;
      padding: 1.3rem 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: flex-start;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .stars {
      color: #fbbf24;
      font-size: 1.1rem;
      letter-spacing: 2px;
    }

    .filter-bar {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-select {
      padding: 0.5rem 1rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      color: #333;
    }

    .btn-delete {
      padding: 0.4em 1em;
      background: transparent;
      border: 1px solid #dc2626;
      color: #f87171;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .btn-delete:hover {
      background: rgba(220, 38, 38, 0.1);
    }

    .stat-chip {
      display: inline-block;
      padding: 0.25em 0.7em;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <aside>
    <a href="admin-dashboard.html" class="logo">leef 🍃</a>
    <nav>
      <a href="admin-dashboard.html">Overview</a>
      <a href="ledger-view.html">Ledger</a>
      <a href="new-registration.html">Registration Requests</a>
      <a href="location-requests.html">Location Requests</a>
      <a href="product-admin.html">Products</a>
      <a href="feedback-admin.html" class="active">Feedback</a>
      <a href="questions-admin.html">Questions</a>
      <a href="refund-approval.html">Refunds</a>
      <a href="admin-profile.html">Profile</a>
    </nav>
  </aside>

  <script src="admin-sidebar.js"></script>

  <main>
    <div
      style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem;">
      <div>
        <h1 class="page-title" style="margin-bottom:0.2rem;">Customer Feedback</h1>
        <p class="page-subtitle">All product reviews submitted by customers</p>
      </div>
      <div id="stats" style="display:flex; gap:1rem; flex-wrap:wrap;"></div>
    </div>

    <div class="filter-bar">
      <select id="filterRating" class="filter-select" onchange="applyFilter()">
        <option value="">All Ratings</option>
        <option value="5">⭐⭐⭐⭐⭐ 5 Stars</option>
        <option value="4">⭐⭐⭐⭐ 4 Stars</option>
        <option value="3">⭐⭐⭐ 3 Stars</option>
        <option value="2">⭐⭐ 2 Stars</option>
        <option value="1">⭐ 1 Star</option>
      </select>
      <input type="text" id="searchInput" class="filter-select" placeholder="Search product or customer..."
        oninput="applyFilter()" style="flex:1; min-width:200px;">
    </div>

    <div id="feedback-list">
      <div style="text-align:center; color:#888; padding:3em;">Loading feedback...</div>
    </div>
  </main>

  <script>
    const API = 'http://localhost:5000';
    let allFeedback = [];

    async function loadFeedback() {
      const container = document.getElementById('feedback-list');
      try {
        const res = await fetch(`${API}/api/feedback/admin`);
        allFeedback = await res.json();
        renderStats();
        applyFilter();
      } catch (e) {
        container.innerHTML = `<div style="color:#f87171;text-align:center;padding:2em;">Failed to load feedback: ${e.message}</div>`;
      }
    }

    function renderStats() {
      const avg = allFeedback.length ? (allFeedback.reduce((s, f) => s + f.rating, 0) / allFeedback.length).toFixed(1) : 0;
      document.getElementById('stats').innerHTML = `
        <div class="stat-chip" style="background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid #fbbf24;">⭐ Avg: ${avg}</div>
        <div class="stat-chip" style="background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid #4ade80;">${allFeedback.length} Reviews</div>
      `;
    }

    function applyFilter() {
      const ratingFilter = document.getElementById('filterRating').value;
      const search = document.getElementById('searchInput').value.toLowerCase();
      let filtered = allFeedback;
      if (ratingFilter) filtered = filtered.filter(f => f.rating == ratingFilter);
      if (search) filtered = filtered.filter(f =>
        (f.product_name || '').toLowerCase().includes(search) ||
        (f.customer_name || '').toLowerCase().includes(search) ||
        (f.comment || '').toLowerCase().includes(search)
      );
      renderList(filtered);
    }

    function renderList(list) {
      const container = document.getElementById('feedback-list');
      if (list.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#888;padding:3em;">No feedback found.</div>';
        return;
      }
      container.innerHTML = '';
      list.forEach(f => {
        const stars = '★'.repeat(f.rating) + '☆'.repeat(5 - f.rating);
        const sellerStars = '★'.repeat(f.seller_rating || 0) + '☆'.repeat(5 - (f.seller_rating || 0));
        const card = document.createElement('div');
        card.className = 'feedback-card';
        card.id = `fb-${f.id}`;
        card.innerHTML = `
          <div style="flex:1; min-width: 200px;">
            <div style="display:flex; align-items:center; gap:1rem; margin-bottom:0.5rem; flex-wrap:wrap;">
              <span style="font-weight:700; color:#222; font-size:1rem;">${f.product_name}</span>
              <span class="stars">${stars}</span>
              <span style="font-size:0.8rem; color:#888;">Product</span>
              ${f.seller_rating ? `<span class="stars" style="font-size:0.9rem;">${sellerStars}</span><span style="font-size:0.8rem;color:#888;">Service</span>` : ''}
            </div>
            <div style="color:#9ca3af; font-size:0.85rem; margin-bottom:0.6rem;">
              👤 ${f.customer_name} &nbsp;•&nbsp; ${f.customer_email} 
              ${f.order_final_amount ? `&nbsp;•&nbsp; <strong style="color:#16a34a;">LKR ${parseFloat(f.order_final_amount).toLocaleString()} (Final)</strong>` : ''}
              &nbsp;•&nbsp; ${new Date(f.created_at).toLocaleDateString()}
            </div>
            ${f.comment ? `<div style="color:#444; font-size:0.93rem; line-height:1.5; background:#f9f9f9; border-radius:8px; padding:0.7rem 1rem; border:1px solid #eee;">"${f.comment}"</div>` : '<div style="color:#666;font-style:italic;font-size:0.9rem;">No comment provided</div>'}
            ${f.image_url ? `<div style="margin-top:0.6rem;"><a href="${API}${f.image_url}" target="_blank"><img src="${API}${f.image_url}" style="max-height:90px;border-radius:6px;border:1px solid #ddd;object-fit:cover;" alt="Review photo"></a><div style="font-size:0.75rem;color:#666;margin-top:2px;">📷 Attached photo</div></div>` : ''}
          </div>
          <button class="btn-delete" onclick="deleteFeedback(${f.id})">🗑 Delete</button>
        `;
        container.appendChild(card);
      });
    }

    async function deleteFeedback(id) {
      if (!confirm('Are you sure you want to delete this feedback?')) return;
      try {
        const res = await fetch(`${API}/api/feedback/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Failed to delete');
        document.getElementById(`fb-${id}`).remove();
        allFeedback = allFeedback.filter(f => f.id !== id);
        renderStats();
        showToast('Feedback deleted');
      } catch (e) {
        showToast('Failed to delete feedback', '#dc2626');
      }
    }

    function showToast(msg, color = '#16a34a') {
      const t = document.createElement('div');
      t.textContent = msg;
      Object.assign(t.style, { position: 'fixed', right: '20px', bottom: '20px', background: color, color: '#fff', padding: '12px 18px', borderRadius: '8px', zIndex: 99999, fontWeight: '600' });
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    loadFeedback();
  </script>
</body>

</html>
