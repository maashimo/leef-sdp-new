<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Return Request - 🍃 Leef</title>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .top-navbar {
            background-color: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid #333;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .navbar-logo {
            text-decoration: none;
            font-weight: bold;
            color: #4ade80;
        }

        .navbar-nav {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 2rem;
        }

        .navbar-link {
            text-decoration: none;
            color: #eee;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            transition: background-color 0.2s;
        }

        .navbar-link.active {
            background-color: #10b981;
            color: white;
        }

        .navbar-link:hover {
            background-color: #333;
        }

        .main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 1rem;
        }

        .form-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 2rem;
            color: #eee;
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #333;
            padding-bottom: 1rem;
        }

        .form-section {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 0.7rem;
            display: block;
            color: #ddd;
        }

        .order-choice {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1.1rem;
            border: 1px solid #333;
            border-radius: 0.7em;
            cursor: pointer;
            background: #222;
            margin-bottom: 0.7rem;
            transition: border-color 0.2s, background 0.2s;
        }

        .order-choice:hover {
            border-color: #4ade80;
        }

        .order-choice.selected {
            border-color: #16a34a;
            background: rgba(22, 163, 74, 0.1);
        }

        .order-choice input[type=radio] {
            accent-color: #16a34a;
            width: 18px;
            height: 18px;
        }

        .reason-group label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 0;
            cursor: pointer;
            color: #ccc;
        }

        .reason-group input[type=radio] {
            accent-color: #16a34a;
            width: 16px;
            height: 16px;
        }

        .form-textarea {
            width: 100%;
            min-height: 80px;
            padding: 0.7rem;
            border-radius: 0.5em;
            border: 1px solid #333;
            background: #111;
            color: #eee;
            resize: vertical;
            box-sizing: border-box;
        }

        .form-textarea:focus {
            border-color: #4ade80;
            outline: none;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .btn-cancel {
            padding: 0.7rem 1.5rem;
            border-radius: 0.5em;
            font-weight: 600;
            border: 1px solid #4ade80;
            color: #4ade80;
            background: transparent;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-cancel:hover {
            background: rgba(74, 222, 128, 0.1);
        }

        .btn-submit {
            padding: 0.7rem 1.5rem;
            border-radius: 0.5em;
            font-weight: 600;
            border: none;
            background: #16a34a;
            color: #fff;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: #15803d;
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <nav class="top-navbar">
        <a href="index.html" class="navbar-logo">leef 🍃</a>
        <ul class="navbar-nav">
            <li><a href="customer-dashboard.html" class="navbar-link">Dashboard</a></li>
            <li><a href="products.html" class="navbar-link">Products</a></li>
            <li><a href="feedback.html" class="navbar-link">Feedback</a></li>
            <li><a href="returns.html" class="navbar-link active">Refund</a></li>
            <li><a href="profile.html" class="navbar-link">Profile</a></li>
            <li><a href="index.html" class="navbar-link" onclick="sessionStorage.removeItem('user')">Logout</a></li>
        </ul>
    </nav>

    <main class="main">
        <div class="form-card">
            <div class="form-header">
                <h2 style="margin:0; color:#fff;">New Refund Request</h2>
                <a href="returns.html" style="color:#999; font-size:1.5rem; text-decoration:none;">&times;</a>
            </div>

            <form id="refundForm" onsubmit="submitRefund(event)">
                <div class="form-section">
                    <label class="form-label">Select Order to Refund</label>
                    <div id="orders-list">
                        <div style="color:#888; text-align:center; padding:1em;">Loading your orders...</div>
                    </div>
                </div>

                <div class="form-section">
                    <label class="form-label">Reason for Refund</label>
                    <div class="reason-group">
                        <label><input type="radio" name="reason" value="Product damaged during delivery" required>
                            Product damaged during delivery</label>
                        <label><input type="radio" name="reason" value="Quality not as expected"> Quality not as
                            expected</label>
                        <label><input type="radio" name="reason" value="Wrong product delivered"> Wrong product
                            delivered</label>
                        <label><input type="radio" name="reason" value="Order not received"> Order not received</label>
                        <label><input type="radio" name="reason" value="Other"> Other</label>
                    </div>
                </div>

                <div class="form-section">
                    <label class="form-label">Additional Comments (Optional)</label>
                    <textarea class="form-textarea" id="refundDesc"
                        placeholder="Please provide any additional details about the issue..."></textarea>
                </div>

                <div class="form-section">
                    <label class="form-label">Supporting Images (Optional, up to 3)</label>
                    <label for="refundImages"
                        style="display:flex; align-items:center; gap:0.8rem; padding:0.8rem 1rem; background:#111; border:1px dashed #444; border-radius:8px; cursor:pointer; transition:border-color 0.2s;"
                        onmouseover="this.style.borderColor='#4ade80'" onmouseout="this.style.borderColor='#444'">
                        <span style="font-size:1.4rem;">📷</span>
                        <div>
                            <div style="color:#ccc; font-size:0.9rem;">Click to upload images</div>
                            <div style="color:#666; font-size:0.78rem;">Up to 3 photos, 5MB each — helps process your
                                refund faster</div>
                        </div>
                    </label>
                    <input type="file" id="refundImages" accept="image/*" multiple style="display:none;"
                        onchange="previewRefundImages(this)">
                    <div id="refundImagePreviews" style="display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:0.6rem;">
                    </div>
                </div>

                <div id="saleWarning" style="background: rgba(248,113,113,0.1); border: 1px solid #f87171; color: #f87171; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: none; align-items: center; gap: 0.8rem;">
                    <span style="font-size: 1.2rem;">⚠️</span>
                    <span>Refunds are not accepted for products purchased on sale.</span>
                </div>

                <div id="refundError" style="color:#f87171; font-size:0.9rem; margin-bottom:0.5rem; display:none;">
                </div>

                <div class="form-actions">
                    <a href="returns.html" class="btn-cancel">Cancel</a>
                    <button type="submit" class="btn-submit" id="submitBtn">Submit Refund Request</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const API = 'http://localhost:5000';
        const user = JSON.parse(sessionStorage.getItem('user') || 'null');
        let selectedOrderId = null;
        let selectedProductId = null;
        let selectedOrderSource = null;

        if (!user) {
            sessionStorage.setItem('redirectAfterLogin', 'new-return-request.html');
            window.location.href = 'login.html';
        }

        async function loadOrders() {
            const list = document.getElementById('orders-list');
            try {
                const res = await fetch(`${API}/api/orders/customer/${user.id}`);
                const orders = await res.json();
                const now = new Date();
                const eligible = orders.filter(o => {
                    // Allow pending, approved, or completed orders for refund
                    if (o.status !== 'approved' && o.status !== 'completed' && o.status !== 'pending') return false;
                    const completionDate = new Date(o.updated_at || o.created_at);
                    const diffDays = (now - completionDate) / (1000 * 60 * 60 * 24);
                    // Within 1 week (handles cases like 'placed tomorrow' or today)
                    return diffDays <= 7; 
                });

                if (eligible.length === 0) {
                    list.innerHTML = '<div style="color:#888;text-align:center;padding:1em;">No orders from the last 7 days found. Refunds can only be requested within 1 week.</div>';
                    return;
                }

                list.innerHTML = '';
                eligible.forEach((order, idx) => {
                    const imgUrl = order.image_url ? `${API}${order.image_url}` : 'https://via.placeholder.com/48x48?text=🍃';
                    const isOnSale = order.sale_details && order.sale_details.trim() !== "";
                    const div = document.createElement('label');
                    div.className = 'order-choice' + (idx === 0 ? ' selected' : '');
                    div.innerHTML = `
            <input type="radio" name="order" value="${order.id}" ${idx === 0 ? 'checked' : ''}>
            <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/64x64?text=🍃'"
              style="width:64px; height:64px; object-fit:cover; border-radius:0.8em; border: 1px solid #333;" alt="${order.product_name}">
            <div style="flex:1;">
              <div style="font-weight:700; color: #fff; font-size:1.05rem; margin-bottom: 0.2rem;">${order.product_name || 'Unknown Product'}</div>
              <div style="font-size:0.85em; color:#9ca3af; margin-bottom: 0.2rem;">#REQ-${order.id} • ${new Date(order.updated_at || order.created_at).toLocaleDateString()}</div>
              <div style="color: #4ade80; font-weight: 700; font-size: 0.9rem;">Total Paid: Rs. ${parseFloat(order.total_price || 0).toLocaleString()}</div>
              ${isOnSale ? `<div style="font-size: 0.75rem; color: #f87171; font-weight: 600; margin-top: 4px;">🔥 SALE ITEM (No Refunds)</div>` : ''}
            </div>
          `;
                    div.addEventListener('click', () => {
                        document.querySelectorAll('.order-choice').forEach(el => el.classList.remove('selected'));
                        div.classList.add('selected');
                        selectedOrderId = order.id;
                        selectedProductId = order.product_id;
                        selectedOrderSource = order.source;
                        checkSaleStatus(order);
                    });
                    list.appendChild(div);
                });

                // Set defaults for first selected
                if (eligible.length > 0) {
                    selectedOrderId = eligible[0].id;
                    selectedProductId = eligible[0].product_id;
                    selectedOrderSource = eligible[0].source;
                    checkSaleStatus(eligible[0]);
                }
            } catch (e) {
                list.innerHTML = `<div style="color:#f87171;text-align:center;padding:1em;">Failed to load orders: ${e.message}</div>`;
            }
        }

        function checkSaleStatus(order) {
            const warning = document.getElementById('saleWarning');
            const btn = document.getElementById('submitBtn');
            const isOnSale = order.sale_details && order.sale_details.trim() !== "";
            
            if (isOnSale) {
                warning.style.display = 'flex';
                btn.disabled = true;
                btn.title = 'Refunds are not accepted for sale items';
            } else {
                warning.style.display = 'none';
                btn.disabled = false;
                btn.title = '';
            }
        }

        async function submitRefund(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errDiv = document.getElementById('refundError');
            errDiv.style.display = 'none';

            if (!selectedOrderId) {
                errDiv.textContent = 'Please select an order to refund.';
                errDiv.style.display = 'block';
                return;
            }

            const reason = document.querySelector('input[name="reason"]:checked')?.value;
            if (!reason) {
                errDiv.textContent = 'Please select a reason for refund.';
                errDiv.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Submitting...';

            try {
                const fd = new FormData();
                fd.append('userId', user.id);
                fd.append('orderId', selectedOrderId);
                fd.append('source', selectedOrderSource || '');
                fd.append('productId', selectedProductId || '');
                fd.append('reason', reason);
                fd.append('description', document.getElementById('refundDesc').value);
                // Attach up to 3 images
                const imgFiles = document.getElementById('refundImages').files;
                const max = Math.min(imgFiles.length, 3);
                for (let i = 0; i < max; i++) fd.append('images', imgFiles[i]);

                const res = await fetch(`${API}/api/refunds`, { method: 'POST', body: fd });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Failed to submit');

                localStorage.setItem('refundSuccess', '1');
                window.location.href = 'returns.html';
            } catch (err) {
                errDiv.textContent = err.message;
                errDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Submit Refund Request';
            }
        }

        function previewRefundImages(input) {
            const previews = document.getElementById('refundImagePreviews');
            previews.innerHTML = '';
            const files = Array.from(input.files).slice(0, 3);
            files.forEach((file, idx) => {
                const reader = new FileReader();
                reader.onload = e => {
                    const wrap = document.createElement('div');
                    wrap.style.cssText = 'position:relative;display:inline-block;';
                    wrap.innerHTML = `
                        <img src="${e.target.result}" style="height:80px;width:80px;object-fit:cover;border-radius:6px;border:1px solid #333;">
                        <button type="button" onclick="removeRefundImage(${idx})" style="position:absolute;top:-6px;right:-6px;background:#dc2626;border:none;border-radius:50%;width:18px;height:18px;color:#fff;font-size:0.7rem;cursor:pointer;line-height:1;">×</button>
                    `;
                    wrap.id = `refund-prev-${idx}`;
                    previews.appendChild(wrap);
                };
                reader.readAsDataURL(file);
            });
        }

        function removeRefundImage(idx) {
            const el = document.getElementById(`refund-prev-${idx}`);
            if (el) el.remove();
            // Clear the whole file input and re-render remaining
            // (simpler: just clear everything)
            const input = document.getElementById('refundImages');
            input.value = '';
            document.getElementById('refundImagePreviews').innerHTML = '';
        }

        loadOrders();
    </script>
</body>

</html>
