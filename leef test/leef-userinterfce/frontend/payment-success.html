<!DOCTYPE html>
<html lang="en">

<head>
    <script src="api-config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - leef 🍃</title>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #eee;
            margin: 0;
            min-height: 100vh;
        }

        .top-navbar {
            background: rgba(10, 10, 10, 0.97);
            border-bottom: 1px solid #222;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-logo {
            text-decoration: none;
            font-weight: 700;
            color: #4ade80;
            font-size: 1.1rem;
        }

        .page-wrap {
            max-width: 540px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .step-bar {
            display: flex;
            gap: 0;
            margin-bottom: 2rem;
        }

        .step {
            flex: 1;
            text-align: center;
            padding: 0.6rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #555;
            border-bottom: 3px solid #222;
        }

        .step.done {
            color: #4ade80;
            border-color: #4ade80;
        }

        .card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 14px;
            padding: 1.8rem;
            text-align: center;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: pop 0.4s ease;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .success-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #4ade80;
            margin-bottom: 0.5rem;
        }

        .success-sub {
            color: #888;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .txn-box {
            background: #0d0d0d;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-family: monospace;
            color: #4ade80;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .coins-earned {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fbbf24;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .action-btns {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .action-btn:hover { opacity: 0.85; }

        .action-btn.primary {
            background: #16a34a;
            color: #fff;
        }

        .action-btn.secondary {
            background: #222;
            color: #ccc;
        }

        .loading-state {
            text-align: center;
            padding: 3rem;
        }

        .spinner-lg {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(74, 222, 128, 0.2);
            border-top-color: #4ade80;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            text-align: center;
            padding: 2rem;
        }

        .error-icon {
            font-size: 3rem;
            margin-bottom: 0.75rem;
        }

        .error-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ef4444;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <nav class="top-navbar">
        <a href="index.html" class="navbar-logo">leef 🍃</a>
        <span style="color:#888; font-size:0.9rem;">🔒 Payment Complete</span>
    </nav>

    <div class="page-wrap">
        <!-- Step bar -->
        <div class="step-bar">
            <div class="step done">🛒 Cart</div>
            <div class="step done">📋 Confirm</div>
            <div class="step done">💳 Payment</div>
            <div class="step done">✅ Done</div>
        </div>

        <!-- Loading state -->
        <div id="loadingScreen" class="card">
            <div class="loading-state">
                <div class="spinner-lg"></div>
                <div style="color: #fff; font-weight: 600; font-size: 1.1rem;">Verifying your payment...</div>
                <div style="color: #888; font-size: 0.85rem; margin-top: 0.5rem;">Please wait, do not close this page.</div>
            </div>
        </div>

        <!-- Success state -->
        <div id="successScreen" class="card" style="display: none;">
            <div class="success-icon">✅</div>
            <div class="success-title">Payment Successful!</div>
            <div class="success-sub" id="successSub">Your card payment was processed successfully.</div>
            <div class="txn-box" id="txnBox"></div>
            <div class="coins-earned" id="coinsEarnedBox" style="display:none;"></div>
            <div class="action-btns">
                <button class="action-btn primary" onclick="goToDashboard()">Go to Dashboard</button>
                <button class="action-btn secondary" onclick="window.location.href='products.html'">Continue Shopping</button>
            </div>
        </div>

        <!-- Error state -->
        <div id="errorScreen" class="card" style="display: none;">
            <div class="error-icon">❌</div>
            <div class="error-title">Payment Verification Failed</div>
            <div style="color: #888; margin-bottom: 1.5rem;" id="errorMsg">We could not verify your payment. Please contact support.</div>
            <div class="action-btns">
                <button class="action-btn primary" onclick="goToDashboard()">Go to Dashboard</button>
                <button class="action-btn secondary" onclick="window.location.href='cart.html'">Back to Cart</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script>
        const API = window.API_BASE_URL;
        const user = JSON.parse(sessionStorage.getItem('user') || 'null');
        if (!user) window.location.href = 'login.html';

        function goToDashboard() {
            const dashUrl = user.role === 'seller' ? 'seller-dashboard.html' : 'customer-dashboard.html';
            window.location.href = dashUrl;
        }

        // Helper: parse price string to numeric per-kg price
        function parsePricePerKg(val) {
            if (typeof val === 'number') return val;
            const str = String(val || '0');
            const match = str.match(/(\d+(?:\.\d+)?)\s*(?:per|\/|Rs\.?)\s*(\d+)?\s*([a-zA-Z]+)/i);
            if (match) {
                let price = parseFloat(match[1]);
                let amount = parseFloat(match[2]) || 1;
                let unit = match[3].toLowerCase();
                let unitInKg = 1;
                if (unit.startsWith('g')) unitInKg = amount / 1000;
                else if (unit.startsWith('kg')) unitInKg = amount;
                else unitInKg = amount;
                return price / unitInKg;
            }
            const fallback = str.match(/[\d.]+/);
            return fallback ? parseFloat(fallback[0]) : 0;
        }

        async function verifyAndFinalize() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session_id');

            if (!sessionId) {
                showError('No session ID found. This page should only be accessed after a Stripe payment.');
                return;
            }

            try {
                // 1. Verify the Stripe session
                const verifyRes = await fetch(`${API}/api/checkout-session/${sessionId}`);
                if (!verifyRes.ok) {
                    const errData = await verifyRes.json();
                    showError('Verification failed: ' + (errData.error || 'Unknown error'));
                    return;
                }

                const session = await verifyRes.json();

                if (session.payment_status !== 'paid') {
                    showError('Payment was not completed. Status: ' + session.payment_status);
                    return;
                }

                // 2. Process orders (same logic as payment.html COD flow)
                const cart = JSON.parse(sessionStorage.getItem('cart') || '[]');
                const checkoutItems = JSON.parse(sessionStorage.getItem('checkoutItems') || '[]');
                const itemsToProcess = checkoutItems.length > 0 ? checkoutItems : cart;
                const amount = (session.amount_total / 100); // Convert from cents
                const coinDiscount = parseFloat(session.metadata?.coinDiscount || '0');
                const txnRef = `STRIPE-${sessionId.slice(-12)}`;
                let coinsEarned = 0;

                // 3. Save payment record
                try {
                    const firstItem = itemsToProcess[0] || {};
                    let cleanOrderId = null;
                    if (firstItem.orderId && typeof firstItem.orderId === 'string') {
                        const match = firstItem.orderId.match(/\d+/);
                        if (match) cleanOrderId = parseInt(match[0]);
                    }

                    await fetch(`${API}/api/payments`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            customerId: user.id,
                            orderId: cleanOrderId,
                            productId: firstItem.id || null,
                            amount: amount,
                            method: 'visa',
                            status: 'paid',
                            transactionRef: txnRef,
                            coinsEarned: 0
                        })
                    });
                } catch (e) {
                    console.warn('Payment record error:', e);
                }

                // 4. Create order records
                for (const item of itemsToProcess) {
                    const itemPrice = parsePricePerKg(item.price);
                    const itemTotal = itemPrice * (item.qty || 1);

                    if (item.orderId && typeof item.orderId === 'string') {
                        // Request-based order
                        const reqIdMatch = item.orderId.match(/\d+/);
                        if (reqIdMatch) {
                            await fetch(`${API}/api/orders/item/${reqIdMatch[0]}/payment`, {
                                method: 'PATCH',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    userId: user.id,
                                    paymentStatus: 'paid',
                                    status: 'completed'
                                })
                            });
                        }
                    } else {
                        // Direct order
                        await fetch(`${API}/api/orders/direct`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                userId: user.id,
                                productId: item.id,
                                sellerId: item.seller_id || 0,
                                quantity: item.qty,
                                unitPrice: itemPrice,
                                totalPrice: itemTotal,
                                paymentMethod: 'visa',
                                paymentStatus: 'paid',
                                status: 'completed',
                                district: item.district,
                                address: item.address || item.location_name
                            })
                        });
                    }
                }

                // 5. Award loyalty coins
                try {
                    const coinRes = await fetch(`${API}/api/coins/earn`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ customerId: user.id, amount: amount })
                    });
                    if (coinRes.ok) {
                        const coinData = await coinRes.json();
                        coinsEarned = parseFloat(coinData.earned) || 0;
                    }
                } catch (e) {
                    console.warn('Coins error:', e);
                }

                // 6. Clear cart and checkout data
                sessionStorage.removeItem('cart');
                sessionStorage.removeItem('checkoutAmount');
                sessionStorage.removeItem('checkoutItems');
                sessionStorage.removeItem('coinDiscount');
                sessionStorage.removeItem('selectedPaymentMethod');
                sessionStorage.removeItem('finalCheckoutAmount');
                sessionStorage.removeItem('deliveryCharge');
                sessionStorage.removeItem('cartSurcharge');

                // 7. Show success
                showSuccess(txnRef, amount, coinsEarned);

            } catch (err) {
                console.error('Payment verification error:', err);
                showError('An unexpected error occurred: ' + err.message);
            }
        }

        function showSuccess(txnRef, amount, coinsEarned) {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';

            document.getElementById('successSub').textContent =
                `Rs ${amount.toFixed(2)} charged to your card via Stripe.`;
            document.getElementById('txnBox').textContent = `Transaction: ${txnRef}`;

            if (coinsEarned > 0) {
                const coinsBox = document.getElementById('coinsEarnedBox');
                coinsBox.style.display = 'inline-flex';
                coinsBox.textContent = `🪙 +${coinsEarned} loyalty coins earned!`;
            }
        }

        function showError(message) {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('errorScreen').style.display = 'block';
            document.getElementById('errorMsg').textContent = message;
        }

        // Run on page load
        verifyAndFinalize();
    </script>
</body>

</html>
